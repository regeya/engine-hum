<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Space Hum Generator</title>
    <style>
      body {
        background-color: #121212;
        color: #e0e0e0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #00e676;
        text-align: center;
      }
      .card {
        background: #1e1e1e;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
      }
      button {
        width: 100%;
        padding: 15px;
        background: #00e676;
        color: #121212;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        margin-bottom: 25px;
      }
      button:active {
        opacity: 0.8;
      }
      .control-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 8px;
        color: #aaa;
      }
      input[type="range"] {
        width: 100%;
        accent-color: #00e676;
        margin-top: 5px;
      }
      .value-display {
        float: right;
        color: #00e676;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🛸 Space Hum Generator</h1>
      <button id="playBtn">START HUM</button>

      <div class="control-group">
        <label
          >Master Volume:
          <span id="volVal" class="value-display">50%</span></label
        >
        <input type="range" id="volume" min="0" max="100" step="1" value="50" />
      </div>

      <div class="control-group">
        <label
          >Tremolo Speed (LFO):
          <span id="tremSpeedVal" class="value-display">0.5 Hz</span></label
        >
        <input
          type="range"
          id="tremSpeed"
          min="0.1"
          max="10"
          step="0.05"
          value="0.5"
        />
      </div>

      <div class="control-group">
        <label
          >Tremolo Depth:
          <span id="tremDepthVal" class="value-display">25%</span></label
        >
        <input
          type="range"
          id="tremDepth"
          min="0"
          max="100"
          step="1"
          value="25"
        />
      </div>

      <div class="control-group">
        <label
          >Filter Cutoff:
          <span id="filterVal" class="value-display">120 Hz</span></label
        >
        <input
          type="range"
          id="filter"
          min="50"
          max="300"
          step="5"
          value="120"
        />
      </div>

      <div class="control-group">
        <label
          >Warm Engine Rumble Vol:
          <span id="rumbleVal" class="value-display">20%</span></label
        >
        <input type="range" id="rumble" min="0" max="100" step="1" value="20" />
      </div>

      <div class="control-group">
        <label
          >Console Beeps Vol:
          <span id="beepVal" class="value-display">15%</span></label
        >
        <input
          type="range"
          id="beepVolume"
          min="0"
          max="100"
          step="1"
          value="15"
        />
      </div>
    </div>

    <script>
      let audioCtx = null;
      let isPlaying = false;

      // Audio Nodes
      let noiseSource, tremoloLFO, tremoloGain, lfoDepthGain, masterGain;
      let filter1, filter2;
      let rumbleOsc1, rumbleOsc2, rumbleGainNode;
      let beepTimer = null;

      function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1. Generate White Noise Buffer
        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(
          1,
          bufferSize,
          audioCtx.sampleRate,
        );
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = (Math.random() * 2 - 1) * 0.5;
        }

        noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;

        // 2. Cascade 2 Lowpass Filters
        filter1 = audioCtx.createBiquadFilter();
        filter2 = audioCtx.createBiquadFilter();

        [filter1, filter2].forEach((f) => {
          f.type = "lowpass";
          f.frequency.value = parseFloat(
            document.getElementById("filter").value,
          );
          f.Q.value = 0.5;
        });

        // 3. Setup Tremolo LFO & Tremolo Gain Node
        tremoloGain = audioCtx.createGain();
        tremoloGain.gain.value = 0.8;

        tremoloLFO = audioCtx.createOscillator();
        tremoloLFO.type = "sine";
        tremoloLFO.frequency.value = parseFloat(
          document.getElementById("tremSpeed").value,
        );

        lfoDepthGain = audioCtx.createGain();
        const depthPct =
          parseFloat(document.getElementById("tremDepth").value) / 100;
        lfoDepthGain.gain.value = depthPct * 0.3;

        // 4. Setup Master Gain (Controlled by the top volume slider)
        masterGain = audioCtx.createGain();
        masterGain.gain.value =
          parseFloat(document.getElementById("volume").value) / 100;

        // 5. Setup Star Trek Warm Engine Rumble (Harmonic Triangle Waves)
        rumbleOsc1 = audioCtx.createOscillator();
        rumbleOsc1.type = "triangle";
        rumbleOsc1.frequency.value = 60; // 60Hz baseline

        rumbleOsc2 = audioCtx.createOscillator();
        rumbleOsc2.type = "triangle";
        rumbleOsc2.frequency.value = 90; // Harmonic fifth

        rumbleGainNode = audioCtx.createGain();
        const rumbleVol =
          parseFloat(document.getElementById("rumble").value) / 100;
        rumbleGainNode.gain.value = rumbleVol * 0.3;

        // --- PATCH ROUTING ---
        noiseSource.connect(tremoloGain);
        tremoloGain.connect(filter1);

        rumbleOsc1.connect(rumbleGainNode);
        rumbleOsc2.connect(rumbleGainNode);
        rumbleGainNode.connect(filter1); // Send warm rumble through the filters

        filter1.connect(filter2);
        filter2.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        // LFO -> Depth -> Tremolo Gain's Volume parameter
        tremoloLFO.connect(lfoDepthGain);
        lfoDepthGain.connect(tremoloGain.gain);

        // Start everything
        noiseSource.start();
        tremoloLFO.start();
        rumbleOsc1.start();
        rumbleOsc2.start();

        // Start the ambient console beep scheduler
        startBeepScheduler();
      }

      // --- SYNTHESIZE CONSOLE BEEPS ---
      function playConsoleBeep() {
        const beepVolPct = parseFloat(
          document.getElementById("beepVolume").value,
        );

        // Skip playing completely if volume is slider is down at zero
        if (!audioCtx || audioCtx.state !== "running" || beepVolPct === 0)
          return;

        const osc = audioCtx.createOscillator();
        const beepGain = audioCtx.createGain();

        osc.type = "triangle";

        // Cozy, warm sci-fi tones (pentatonic/ambient intervals)
        const pitches = [932, 1396];
        const randomPitch = pitches[Math.floor(Math.random() * pitches.length)];
        osc.frequency.value = randomPitch;

        const now = audioCtx.currentTime;

        // Map the 0-100% slider to a comfortable, non-piercing absolute gain limit (max 0.05)
        const targetGain = (beepVolPct / 100) * 0.05;

        // Fast attack, slow natural decay envelope
        beepGain.gain.setValueAtTime(0, now);
        beepGain.gain.linearRampToValueAtTime(targetGain, now + 0.01);
        beepGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

        osc.connect(beepGain);
        beepGain.connect(masterGain);

        osc.start(now);
        osc.stop(now + 0.2);
      }

      // Randomly schedules single or double-beeps to mimic real computer traffic
      function startBeepScheduler() {
        if (beepTimer) clearTimeout(beepTimer);

        // Schedule next trigger randomly between 4 and 8 seconds
        const delay = 4000 + Math.random() * 4000;

        beepTimer = setTimeout(() => {
          if (isPlaying) {
            playConsoleBeep();

            // 40% chance of a double "chirp-chirp" beep
            if (Math.random() < 0.4) {
              setTimeout(playConsoleBeep, 180);
            }
          }
          startBeepScheduler();
        }, delay);
      }

      // UI Interactions (Corrected to handle Browser suspension instantly!)
      document.getElementById("playBtn").addEventListener("click", function () {
        if (!audioCtx) {
          initAudio();
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume().then(() => {
            this.textContent = "STOP HUM";
            this.style.background = "#ff1744";
            isPlaying = true;
          });
        } else if (audioCtx.state === "running") {
          audioCtx.suspend().then(() => {
            this.textContent = "START HUM";
            this.style.background = "#00e676";
            isPlaying = false;
          });
        }
      });

      // Slider Listeners
      document.getElementById("volume").addEventListener("input", function (e) {
        document.getElementById("volVal").textContent = e.target.value + "%";
        if (masterGain) {
          masterGain.gain.setValueAtTime(
            parseFloat(e.target.value) / 100,
            audioCtx.currentTime,
          );
        }
      });

      document
        .getElementById("tremSpeed")
        .addEventListener("input", function (e) {
          document.getElementById("tremSpeedVal").textContent =
            e.target.value + " Hz";
          if (tremoloLFO)
            tremoloLFO.frequency.setValueAtTime(
              parseFloat(e.target.value),
              audioCtx.currentTime,
            );
        });

      document
        .getElementById("tremDepth")
        .addEventListener("input", function (e) {
          document.getElementById("tremDepthVal").textContent =
            e.target.value + "%";
          if (lfoDepthGain) {
            const depthPct = parseFloat(e.target.value) / 100;
            lfoDepthGain.gain.setValueAtTime(
              depthPct * 0.3,
              audioCtx.currentTime,
            );
          }
        });

      document.getElementById("filter").addEventListener("input", function (e) {
        document.getElementById("filterVal").textContent =
          e.target.value + " Hz";
        if (filter1 && filter2) {
          const freq = parseFloat(e.target.value);
          filter1.frequency.setValueAtTime(freq, audioCtx.currentTime);
          filter2.frequency.setValueAtTime(freq, audioCtx.currentTime);
        }
      });

      document.getElementById("rumble").addEventListener("input", function (e) {
        document.getElementById("rumbleVal").textContent = e.target.value + "%";
        if (rumbleGainNode) {
          const vol = (parseFloat(e.target.value) / 100) * 0.3;
          rumbleGainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        }
      });

      document
        .getElementById("beepVolume")
        .addEventListener("input", function (e) {
          document.getElementById("beepVal").textContent = e.target.value + "%";
        });
    </script>
  </body>
</html>
