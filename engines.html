<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&display=swap"
      rel="stylesheet"
    />
    <title>Engine Hum Simulator</title>
    <style>
      body {
        background-color: #0c0f12;
        color: #d2ecf9;
        font-family:
          "Antonio",
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        font-weight: 400;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      h1 {
        font-size: 2.3rem !important;
        font-weight: 700 !important;
        margin-top: 5px;
        margin-bottom: 25px;
        color: #4fc3f7;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: bold;
      }
      .card {
        background: #0a1a2a;
        padding: 24px;
        border-radius: 12px;
        border: 2px solid #2b3a55;
        width: 100%;
        max-width: 400px;
      }

      /* Tactical Bridge Style Button */
      button {
        width: 100%;
        padding: 15px;
        background: #4d94fd;
        color: #081828;
        border: 2px solid #081828;
        border-radius: 9px;
        font-weight: bold;
        font-size: 1.1rem;
        font-family: inherit;
        cursor: pointer;
        margin-bottom: 25px;
        letter-spacing: 1px;
        transition: all 0.15s ease;
      }
      button:active {
        opacity: 0.8;
      }

      .control-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 8px;
        color: #8fa0c0;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Retro Custom Sliders */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        background: #001020;
        border-radius: 3px;
        outline: none;
        margin-top: 8px;
      }

      /* Webkit (Chrome/Safari/Opera) */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 24px;
        border-radius: 2px;
        background: #7eaffc;
        cursor: pointer;
        box-shadow: 0 0 6px rgba(79, 195, 247, 0.5);
      }

      /* Firefox */
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 24px;
        border-radius: 2px;
        background: #4fc3f7;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 6px rgba(79, 195, 247, 0.5);
      }

      .value-display {
        float: right;
        color: #4fc3f7;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Engine Hum Simulation</h1>
      <button id="playBtn">BEGIN SIMULATION</button>

      <div class="control-group">
        <label
          >Engine Speed:
          <span id="tremSpeedVal" class="value-display">0.5 Hz</span></label
        >
        <input
          type="range"
          id="tremSpeed"
          min="0.1"
          max="10"
          step="0.05"
          value="0.5"
        />
      </div>

      <div class="control-group">
        <label
          >Engine Thrum:
          <span id="tremDepthVal" class="value-display">25%</span></label
        >
        <input
          type="range"
          id="tremDepth"
          min="0"
          max="100"
          step="1"
          value="25"
        />
      </div>

      <div class="control-group">
        <label
          >Engine Hiss:
          <span id="filterVal" class="value-display">120 Hz</span></label
        >
        <input
          type="range"
          id="filter"
          min="50"
          max="300"
          step="5"
          value="120"
        />
      </div>

      <div class="control-group">
        <label
          >Injector Volume Rumble:
          <span id="rumbleVal" class="value-display">12%</span></label
        >
        <input type="range" id="rumble" min="0" max="100" step="1" value="12" />
      </div>

      <div class="control-group">
        <label
          >Consoles: <span id="beepVal" class="value-display">0%</span></label
        >
        <input
          type="range"
          id="beepVolume"
          min="0"
          max="100"
          step="1"
          value="0"
        />
      </div>
    </div>

    <script>
      let audioCtx = null;
      let isPlaying = false;

      // Audio Nodes
      let noiseSource, tremoloLFO, tremoloGain, lfoDepthGain, masterGain;
      let filter1, filter2;
      let rumbleOsc1, rumbleOsc2, rumbleGainNode;
      let beepTimer = null;

      function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1. Generate White Noise Buffer
        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(
          1,
          bufferSize,
          audioCtx.sampleRate,
        );
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = (Math.random() * 2 - 1) * 0.5;
        }

        noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;

        // 2. Cascade 2 Lowpass Filters
        filter1 = audioCtx.createBiquadFilter();
        filter2 = audioCtx.createBiquadFilter();

        [filter1, filter2].forEach((f) => {
          f.type = "lowpass";
          f.frequency.value = parseFloat(
            document.getElementById("filter").value,
          );
          f.Q.value = 0.5;
        });

        // 3. Setup Tremolo LFO & Tremolo Gain Node
        tremoloGain = audioCtx.createGain();
        tremoloGain.gain.value = 0.8;

        tremoloLFO = audioCtx.createOscillator();
        tremoloLFO.type = "sine";
        tremoloLFO.frequency.value = parseFloat(
          document.getElementById("tremSpeed").value,
        );

        lfoDepthGain = audioCtx.createGain();
        const depthPct =
          parseFloat(document.getElementById("tremDepth").value) / 100;
        lfoDepthGain.gain.value = depthPct * 0.3;

        // 4. Setup Master Gain (Locked to 100% volume)
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 1.0;

        // 5. Setup Star Trek Warm Engine Rumble (Harmonic Triangle Waves)
        rumbleOsc1 = audioCtx.createOscillator();
        rumbleOsc1.type = "triangle";
        rumbleOsc1.frequency.value = 60;

        rumbleOsc2 = audioCtx.createOscillator();
        rumbleOsc2.type = "triangle";
        rumbleOsc2.frequency.value = 90;

        rumbleGainNode = audioCtx.createGain();
        const rumbleVol =
          parseFloat(document.getElementById("rumble").value) / 100;
        rumbleGainNode.gain.value = rumbleVol * 0.3;

        // --- PATCH ROUTING ---
        noiseSource.connect(tremoloGain);
        tremoloGain.connect(filter1);

        rumbleOsc1.connect(rumbleGainNode);
        rumbleOsc2.connect(rumbleGainNode);
        rumbleGainNode.connect(filter1);

        filter1.connect(filter2);
        filter2.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        tremoloLFO.connect(lfoDepthGain);
        lfoDepthGain.connect(tremoloGain.gain);

        // Start everything
        noiseSource.start();
        tremoloLFO.start();
        rumbleOsc1.start();
        rumbleOsc2.start();

        startBeepScheduler();
      }

      // --- SYNTHESIZE CONSOLE BEEPS ---
      function playConsoleBeep() {
        const beepVolPct = parseFloat(
          document.getElementById("beepVolume").value,
        );

        if (!audioCtx || audioCtx.state !== "running" || beepVolPct === 0)
          return;

        const osc = audioCtx.createOscillator();
        const beepGain = audioCtx.createGain();

        osc.type = "triangle";

        // Cozy, warm sci-fi tones
        const pitches = [932, 1396];
        const randomPitch = pitches[Math.floor(Math.random() * pitches.length)];
        osc.frequency.value = randomPitch;

        const now = audioCtx.currentTime;

        const targetGain = (beepVolPct / 100) * 0.05;

        beepGain.gain.setValueAtTime(0, now);
        beepGain.gain.linearRampToValueAtTime(targetGain, now + 0.01);
        beepGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

        osc.connect(beepGain);
        beepGain.connect(masterGain);

        osc.start(now);
        osc.stop(now + 0.2);
      }

      function startBeepScheduler() {
        if (beepTimer) clearTimeout(beepTimer);

        const delay = 4000 + Math.random() * 4000;

        beepTimer = setTimeout(() => {
          if (isPlaying) {
            playConsoleBeep();

            if (Math.random() < 0.4) {
              setTimeout(playConsoleBeep, 180);
            }
          }
          startBeepScheduler();
        }, delay);
      }

      // Cleaned up toggle logic to handle the initial creation state instantly
      document.getElementById("playBtn").addEventListener("click", function () {
        if (!audioCtx) {
          initAudio();
          this.textContent = "END SIMULATION";
          this.style.background = "#78fbc8";
          this.style.color = "#0f172a";
          isPlaying = true;
          return;
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume().then(() => {
            this.textContent = "END SIMULATION";
            this.style.background = "#78fbc8";
            this.style.color = "#0f172a";
            isPlaying = true;
          });
        } else if (audioCtx.state === "running") {
          audioCtx.suspend().then(() => {
            this.textContent = "BEGIN SIMULATION";
            this.style.background = "#4fc3f7";
            this.style.color = "#081828";
            isPlaying = false;
          });
        }
      });

      // Slider Listeners
      document
        .getElementById("tremSpeed")
        .addEventListener("input", function (e) {
          document.getElementById("tremSpeedVal").textContent =
            e.target.value + " Hz";
          if (tremoloLFO)
            tremoloLFO.frequency.setValueAtTime(
              parseFloat(e.target.value),
              audioCtx.currentTime,
            );
        });

      document
        .getElementById("tremDepth")
        .addEventListener("input", function (e) {
          document.getElementById("tremDepthVal").textContent =
            e.target.value + "%";
          if (lfoDepthGain) {
            const depthPct = parseFloat(e.target.value) / 100;
            lfoDepthGain.gain.setValueAtTime(
              depthPct * 0.3,
              audioCtx.currentTime,
            );
          }
        });

      document.getElementById("filter").addEventListener("input", function (e) {
        document.getElementById("filterVal").textContent =
          e.target.value + " Hz";
        if (filter1 && filter2) {
          const freq = parseFloat(e.target.value);
          filter1.frequency.setValueAtTime(freq, audioCtx.currentTime);
          filter2.frequency.setValueAtTime(freq, audioCtx.currentTime);
        }
      });

      document.getElementById("rumble").addEventListener("input", function (e) {
        document.getElementById("rumbleVal").textContent = e.target.value + "%";
        if (rumbleGainNode) {
          const vol = (parseFloat(e.target.value) / 100) * 0.3;
          rumbleGainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        }
      });

      document
        .getElementById("beepVolume")
        .addEventListener("input", function (e) {
          document.getElementById("beepVal").textContent = e.target.value + "%";
        });
    </script>
  </body>
</html>
