<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engine Core Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&amp;family=Oswald:wght@200..700&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #090909;
        color: #cc9c3d;
        font-family:
          "Antonio",
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        font-weight: 600;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: clamp(10px, 4vh, 40px);
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
        --glow-hue: 22deg;
      }

      /* Pulsating Ambient Engine Glow Layer */
      #glow-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        /* Driven dynamically via JavaScript opacity and transform scaling now */
        background: radial-gradient(
          circle,
          rgba(255, 0, 0, 0.7) 0%,
          rgba(230, 0, 0, 0.2) 40%,
          rgba(64, 0, 0, 0) 80%
        );
        opacity: 0;
        z-index: -2;
        pointer-events: none;
        transition: opacity 0.5s ease;
        filter: hue-rotate(var(--glow-hue));
      }

      body.glow-enabled #glow-layer {
        /* Base opacity state when simulation is on; real-time pulsing is multiplied on top */
        display: block;
      }

      /* Moving Stars Canvas Layer */
      #starfield {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      body.stars-enabled #starfield {
        opacity: 1;
      }

      .app-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 1;
        gap: clamp(5px, 2vh, 20px);
      }

      .card {
        width: 100%;
        max-width: 600px;
        box-sizing: border-box;
        container-type: inline-size;
        background-color: #000000;
        border: 1px solid #222222;
        border-radius: 20px;
        padding: clamp(15px, 3.5vh, 35px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease,
          visibility 0.3s;
      }

      .card.hidden {
        opacity: 0;
        visibility: hidden;
        transform: scale(0.95);
        pointer-events: none;
      }

      button {
        width: 100%;
        padding: clamp(8px, 1.5vh, 14px) 15px clamp(12px, 2vh, 18px) 15px;
        background: #cc9c3c;
        color: #081828;
        border: 2px solid #000000;
        border-radius: 12px;
        font-weight: bold;
        font-size: clamp(1.2rem, 3.5vh, 1.8rem);
        font-family: inherit;
        cursor: pointer;
        margin-bottom: clamp(10px, 2.5vh, 25px);
        letter-spacing: 1px;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        text-align: center;
      }

      button:active {
        opacity: 0.8;
      }

      .control-group {
        margin-bottom: clamp(8px, 2vh, 20px);
      }

      .sub-panel {
        margin-top: clamp(10px, 2.5vh, 25px);
        padding-top: clamp(10px, 2vh, 20px);
        border-top: 1px dashed #334466;
      }

      .panel-title {
        font-size: clamp(0.75rem, 1.5vh, 0.9rem);
        color: #50c2f7;
        margin-bottom: clamp(8px, 1.5vh, 15px);
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }

      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: clamp(8px, 1.5vh, 15px);
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 26px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider-toggle {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #334466;
        transition: 0.3s;
        border-radius: 34px;
        border: 1px solid #090909;
      }

      .slider-toggle:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: #ffcc99;
        transition: 0.3s;
        border-radius: 50%;
      }

      input:checked + .slider-toggle {
        background-color: #cc9c3c;
      }

      input:checked + .slider-toggle:before {
        transform: translateX(24px);
        background-color: #081828;
      }

      label {
        display: block;
        font-size: clamp(0.7rem, 1.5vh, 0.85rem);
        margin-bottom: 4px;
        color: #cc9c3c;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Custom Sliders */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: clamp(6px, 1vh, 10px);
        background: #334466;
        border: 1px solid #090909;
        border-radius: 4px;
        outline: none;
        margin-top: 4px;
        box-sizing: border-box;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: clamp(18px, 2.5vh, 24px);
        border: 2px solid #090909;
        border-radius: 12px;
        background: #ffcc99;
        cursor: pointer;
        box-sizing: border-box;
      }

      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: clamp(18px, 2.5vh, 24px);
        border: 2px solid #090909;
        border-radius: 7px;
        background: #f3f4f7;
        cursor: pointer;
        box-sizing: border-box;
      }

      #glowHue {
        background: linear-gradient(
          to right,
          #ff0000,
          #ffff00,
          #00ff00,
          #00ffff,
          #0000ff,
          #ff00ff,
          #ff0000
        );
      }

      .text-fit-container {
        width: 100%;
        margin-bottom: clamp(15px, 3vh, 30px);
      }

      .text-fit {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      #title {
        display: block;
        white-space: nowrap;
        text-align: center;
        color: #cc9c3c;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        user-select: none;
      }
    </style>
  </head>
  <body class="glow-enabled stars-enabled">
    <div id="glow-layer"></div>
    <canvas id="starfield"></canvas>

    <div class="app-container">
      <div class="card">
        <div class="text-fit-container">
          <div class="text-fit">
            <span id="title">ENGINE CORE SIMULATION</span>
          </div>
        </div>

        <button id="playBtn">ENGAGE SIMULATION</button>

        <div class="control-group">
          <label
            >Engine Speed:
            <span id="tremSpeedVal" class="value-display">0.5 Hz</span></label
          >
          <input
            type="range"
            id="tremSpeed"
            min="0.1"
            max="10"
            step="0.05"
            value="0.5"
          />
        </div>

        <div class="control-group">
          <label
            >Engine Thrum:
            <span id="tremDepthVal" class="value-display">25%</span></label
          >
          <input
            type="range"
            id="tremDepth"
            min="0"
            max="100"
            step="1"
            value="25"
          />
        </div>

        <div class="control-group">
          <label
            >Engine Hiss:
            <span id="filterVal" class="value-display">120 Hz</span></label
          >
          <input
            type="range"
            id="filter"
            min="50"
            max="300"
            step="5"
            value="120"
          />
        </div>

        <div class="control-group">
          <label
            >Injector Volume Rumble:
            <span id="rumbleVal" class="value-display">20%</span></label
          >
          <input
            type="range"
            id="rumble"
            min="0"
            max="100"
            step="1"
            value="20"
          />
        </div>

        <div class="control-group">
          <label
            >Consoles: <span id="beepVal" class="value-display">0%</span></label
          >
          <input
            type="range"
            id="beepVolume"
            min="0"
            max="100"
            step="1"
            value="0"
          />
        </div>

        <div class="sub-panel">
          <div class="panel-title">Visual Customization</div>

          <div class="toggle-container">
            <label for="glowToggle">Ambient Engine Glow</label>
            <label class="switch">
              <input type="checkbox" id="glowToggle" checked />
              <span class="slider-toggle"></span>
            </label>
          </div>

          <div class="toggle-container">
            <label for="starsToggle">Starfield Warp Engine</label>
            <label class="switch">
              <input type="checkbox" id="starsToggle" checked />
              <span class="slider-toggle"></span>
            </label>
          </div>

          <div class="control-group">
            <label
              >Glow Core Hue:
              <span id="glowHueVal" class="value-display"
                >22° (Orange/Yellow)</span
              ></label
            >
            <input
              type="range"
              id="glowHue"
              min="0"
              max="360"
              step="1"
              value="22"
            />
          </div>
        </div>
      </div>
    </div>

    <script>
      function fitText(el) {
        const parent = el.parentElement;
        el.style.fontSize = "10px";
        const available = parent.clientWidth;
        const actual = el.getBoundingClientRect().width;
        if (actual === 0) return;
        const newSize = 10 * (available / actual);
        el.style.fontSize = `${newSize}px`;
      }

      const title = document.getElementById("title");
      const glowLayer = document.getElementById("glow-layer");

      document.fonts.ready.then(() => {
        fitText(title);
      });
      window.addEventListener("resize", () => fitText(title));

      let audioCtx = null;
      let isPlaying = false;
      let baseTimeOffset = 0; // Tracks manual timeline when context is idle

      let noiseSource,
        noiseGain,
        tremoloLFO,
        tremoloGain,
        lfoDepthGain,
        masterGain;
      let filter1, filter2;
      let rumbleOsc1, rumbleOsc2, rumbleGainNode;
      let beepTimer = null;

      function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(
          1,
          bufferSize,
          audioCtx.sampleRate,
        );
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = (Math.random() * 2 - 1) * 0.5;
        }

        noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;

        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 6.0;

        filter1 = audioCtx.createBiquadFilter();
        filter2 = audioCtx.createBiquadFilter();

        [filter1, filter2].forEach((f) => {
          f.type = "lowpass";
          f.frequency.value = parseFloat(
            document.getElementById("filter").value,
          );
          f.Q.value = 0.5;
        });

        tremoloGain = audioGain = audioCtx.createGain();
        tremoloGain.gain.value = 0.5;

        tremoloLFO = audioCtx.createOscillator();
        tremoloLFO.type = "sine";
        tremoloLFO.frequency.value = parseFloat(
          document.getElementById("tremSpeed").value,
        );

        lfoDepthGain = audioCtx.createGain();
        const depthPct =
          parseFloat(document.getElementById("tremDepth").value) / 100;
        lfoDepthGain.gain.value = depthPct * 0.3;

        masterGain = audioCtx.createGain();
        masterGain.gain.value = 1.0;

        rumbleOsc1 = audioCtx.createOscillator();
        rumbleOsc1.type = "triangle";
        rumbleOsc1.frequency.value = 60;

        rumbleOsc2 = audioCtx.createOscillator();
        rumbleOsc2.type = "triangle";
        rumbleOsc2.frequency.value = 90;

        rumbleGainNode = audioCtx.createGain();
        const rumbleVol =
          parseFloat(document.getElementById("rumble").value) / 100;
        rumbleGainNode.gain.value = rumbleVol * 0.3;

        noiseSource.connect(noiseGain);
        noiseGain.connect(tremoloGain);
        tremoloGain.connect(filter1);

        rumbleOsc1.connect(rumbleGainNode);
        rumbleOsc2.connect(rumbleGainNode);
        rumbleGainNode.connect(filter1);

        filter1.connect(filter2);
        filter2.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        tremoloLFO.connect(lfoDepthGain);
        lfoDepthGain.connect(tremoloGain.gain);

        noiseSource.start();
        tremoloLFO.start();
        rumbleOsc1.start();
        rumbleOsc2.start();

        startBeepScheduler();
      }

      function playConsoleBeep() {
        const beepVolPct = parseFloat(
          document.getElementById("beepVolume").value,
        );
        if (!audioCtx || audioCtx.state !== "running" || beepVolPct === 0)
          return;

        const osc = audioCtx.createOscillator();
        const beepGain = audioCtx.createGain();
        osc.type = "square";

        const pitches = [932, 1396];
        osc.frequency.value =
          pitches[Math.floor(Math.random() * pitches.length)];

        const now = audioCtx.currentTime;
        const targetGain = (beepVolPct / 100) * 0.05;

        beepGain.gain.setValueAtTime(0, now);
        beepGain.gain.linearRampToValueAtTime(targetGain, now + 0.01);
        beepGain.gain.linearRampToValueAtTime(targetGain, now + 0.1);
        beepGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

        osc.connect(beepGain);
        beepGain.connect(masterGain);
        osc.start(now);
        osc.stop(now + 0.2);
      }

      function startBeepScheduler() {
        if (beepTimer) clearTimeout(beepTimer);
        const delay = 4000 + Math.random() * 4000;
        beepTimer = setTimeout(() => {
          if (isPlaying) {
            playConsoleBeep();
            if (Math.random() < 0.4) setTimeout(playConsoleBeep, 180);
          }
          startBeepScheduler();
        }, delay);
      }

      document.getElementById("playBtn").addEventListener("click", function () {
        if (!audioCtx) {
          initAudio();
          this.textContent = "DISENGAGE SIMULATION";
          this.style.background = "#fcc19f";
          this.style.color = "#0f172a";
          isPlaying = true;
          return;
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume().then(() => {
            this.textContent = "DISENGAGE SIMULATION";
            this.style.background = "#fcc19f";
            this.style.color = "#0f172a";
            isPlaying = true;
          });
        } else if (audioCtx.state === "running") {
          audioCtx.suspend().then(() => {
            this.textContent = "ENGAGE SIMULATION";
            this.style.background = "#cc9c3c";
            this.style.color = "#081828";
            isPlaying = false;
          });
        }
      });

      document
        .getElementById("tremSpeed")
        .addEventListener("input", function (e) {
          document.getElementById("tremSpeedVal").textContent =
            e.target.value + " Hz";
          if (audioCtx && tremoloLFO) {
            tremoloLFO.frequency.setValueAtTime(
              parseFloat(e.target.value),
              audioCtx.currentTime,
            );
          }
        });

      document
        .getElementById("tremDepth")
        .addEventListener("input", function (e) {
          document.getElementById("tremDepthVal").textContent =
            e.target.value + "%";
          if (audioCtx && lfoDepthGain) {
            const depthPct = parseFloat(e.target.value) / 100;
            lfoDepthGain.gain.setValueAtTime(
              depthPct * 0.3,
              audioCtx.currentTime,
            );
          }
        });

      document.getElementById("filter").addEventListener("input", function (e) {
        document.getElementById("filterVal").textContent =
          e.target.value + " Hz";
        if (audioCtx && filter1 && filter2) {
          const freq = parseFloat(e.target.value);
          filter1.frequency.setValueAtTime(freq, audioCtx.currentTime);
          filter2.frequency.setValueAtTime(freq, audioCtx.currentTime);
        }
      });

      document.getElementById("rumble").addEventListener("input", function (e) {
        document.getElementById("rumbleVal").textContent = e.target.value + "%";
        if (audioCtx && rumbleGainNode) {
          const vol = (parseFloat(e.target.value) / 100) * 0.3;
          rumbleGainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        }
      });

      document
        .getElementById("beepVolume")
        .addEventListener("input", function (e) {
          document.getElementById("beepVal").textContent = e.target.value + "%";
        });

      document
        .getElementById("glowToggle")
        .addEventListener("change", function (e) {
          if (e.target.checked) {
            document.body.classList.add("glow-enabled");
          } else {
            document.body.classList.remove("glow-enabled");
            glowLayer.style.opacity = 0;
          }
        });

      document
        .getElementById("glowHue")
        .addEventListener("input", function (e) {
          const degrees = e.target.value;
          let colorName = "Red";
          if (degrees > 20 && degrees <= 70) colorName = "Orange/Yellow";
          else if (degrees > 70 && degrees <= 160) colorName = "Green";
          else if (degrees > 160 && degrees <= 200) colorName = "Cyan";
          else if (degrees > 200 && degrees <= 260) colorName = "Blue";
          else if (degrees > 260 && degrees <= 320)
            colorName = "Purple/Magenta";

          document.getElementById("glowHueVal").textContent =
            `${degrees}° (${colorName})`;
          document.body.style.setProperty("--glow-hue", `${degrees}deg`);
        });

      /* --- PYGAME STARFIELD & HARD-SYNCED ANIMATION LOOP --- */
      const canvas = document.getElementById("starfield");
      const ctx = canvas.getContext("2d");
      const numStars = 200;
      const stars = [];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * canvas.width - canvas.width / 2,
          y: Math.random() * canvas.height - canvas.height / 2,
          z: Math.random() * canvas.width,
          color: `hsl(${200 + Math.random() * 40}, 85%, ${85 + Math.random() * 10}%)`,
        });
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        const currentSpeedSlider = parseFloat(
          document.getElementById("tremSpeed").value,
        );
        const currentDepthSlider =
          parseFloat(document.getElementById("tremDepth").value) / 100;

        let targetSpeed = isPlaying ? currentSpeedSlider * 4.5 : 0;

        // --- PHASE LOCK PHYSICS ENGINE LOOP ---
        // Grab timeline from AudioContext clock if live, else fall back to a manual timestamp
        let timelineClock = audioCtx ? audioCtx.currentTime : baseTimeOffset;
        if (!isPlaying && !audioCtx) baseTimeOffset += 0.016;

        // Compute a pure mathematical Sine calculation ($1.0$ down to $-1.0$)
        const rawSine = Math.sin(
          2 * Math.PI * currentSpeedSlider * timelineClock,
        );

        // Map sine profile precisely onto visual attributes
        if (isPlaying && document.body.classList.contains("glow-enabled")) {
          const depthMultiplier = currentDepthSlider * 0.9;
          const visualIntensity = 0.45 + rawSine * depthMultiplier * 0.45;
          const scaleStretch =
            0.96 + (rawSine + 1) * 0.5 * (currentDepthSlider * 0.08);

          glowLayer.style.opacity = visualIntensity;
          glowLayer.style.transform = `scale(${scaleStretch})`;
        } else if (!isPlaying) {
          glowLayer.style.opacity = 0;
          glowLayer.style.transform = "scale(1)";
        }

        // --- PYGAME STARFIELD RENDERER ---
        for (let i = 0; i < numStars; i++) {
          let s = stars[i];
          const pxOld = (s.x / s.z) * cx + cx;
          const pyOld = (s.y / s.z) * cy + cy;

          s.z -= targetSpeed;

          if (s.z <= 0) {
            s.x = Math.random() * canvas.width - cx;
            s.y = Math.random() * canvas.height - cy;
            s.z = canvas.width;
            continue;
          }

          const pxNew = (s.x / s.z) * cx + cx;
          const pyNew = (s.y / s.z) * cy + cy;

          if (
            pxNew >= 0 &&
            pxNew <= canvas.width &&
            pyNew >= 0 &&
            pyNew <= canvas.height
          ) {
            const size = (1 - s.z / canvas.width) * 2.5;
            ctx.beginPath();
            if (targetSpeed > 0.5) {
              ctx.moveTo(pxOld, pyOld);
              ctx.lineTo(pxNew, pyNew);
              ctx.lineWidth = size;
              ctx.strokeStyle = s.color;
              ctx.lineCap = "round";
              ctx.stroke();
            } else {
              ctx.arc(pxNew, pyNew, Math.max(0.5, size / 2), 0, Math.PI * 2);
              ctx.fillStyle = s.color;
              ctx.fill();
            }
          }
        }
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);

      document
        .getElementById("starsToggle")
        .addEventListener("change", function (e) {
          if (e.target.checked) {
            document.body.classList.add("stars-enabled");
          } else {
            document.body.classList.remove("stars-enabled");
          }
        });

      const card = document.querySelector(".card");
      document.body.addEventListener("click", () => {
        card.classList.toggle("hidden");
      });
      card.addEventListener("click", (e) => {
        e.stopPropagation();
      });
    </script>
  </body>
</html>
