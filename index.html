    <title>Engine Hum Simulator</title>

      rel="stylesheet"
    />
    <style>
      /* --- GLOBAL REGISTERED CSS PROPERTIES --- */
      /* These MUST be at the top level of the stylesheet to work properly */
      @property --captured-length {
        syntax: "<length>";
        initial-value: 0px;
        inherits: true;
      }

      @property --captured-length2 {
        syntax: "<length>";
        initial-value: 0px;

      body {
        background-color: #090909;
        color: #d2ecf9;
        font-family:
          "Antonio",
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        font-weight: 600;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Container to manage overall responsive layout width */
      .app-container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Establish the card as a container for robust, container-width-based font scaling */
      .card {
        width: 100%;
        box-sizing: border-box;
        container-type: inline-size;
      }

      button {
        width: 100%;
        padding: 12px 15px 18px 15px;
        background: #4fc3f7;
        color: #081828;
        border: 2px solid #081828;
        border-radius: 9px;
        font-weight: bold;
        font-size: 1.8rem;
        font-family: inherit;
        cursor: pointer;
        margin-bottom: 25px;
        letter-spacing: 1px;
        transition: all 0.15s ease;

        /* Force perfect text alignment */
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        text-align: center;
      }
      button:active {
        opacity: 0.8;
      }

      .control-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 8px;
        color: #8fa0c0;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Retro Custom Sliders */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 10px;
        background: #183848;
        border: 2px solid #090909;
        border-radius: 4px;
        outline: none;
        margin-top: 8px;
        box-sizing: border-box;
      }

      /* Webkit (Chrome/Safari/Opera) */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 24px;
        border: 2px solid #090909;
        border-radius: 12px;
        background: #7eaffc;
        cursor: pointer;
        box-sizing: border-box;
      }

      /* Firefox */
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 24px;
        border: 2px solid #090909;
        border-radius: 7px;
        background: #4fc3f7;
        cursor: pointer;
        box-sizing: border-box;
      }
      /* 1. Establish the main container context */
      .text-fit-container {
        width: 100%;
        margin: 5px 0 25px;
      }

      /* 2. Flex wrapper to calculate remaining space */
      .text-fit {
        width: 100%;
      }

      /* Hide the reference text cleanly without removing it from measurement */
      .text-fit > [aria-hidden="true"] {
        visibility: hidden;
        position: absolute;
        white-space: nowrap;
        font-size: 1rem;
      }

      /* 3. The non-hidden element measures its own width */
      .text-fit > :not([aria-hidden]) {
        flex-grow: 1;
        container-type: inline-size;
      }

      /* 4. The nested span performs the trigonometric ratio scaling */
      .text-fit > :not([aria-hidden]) > span {
        --captured-length: 100cqi;
        --available-space: var(--captured-length);
      }

      .text-fit > :not([aria-hidden]) > span > span {
        --captured-length2: 100cqi;

        /* Calculate Ratio: (Available Space) / (Un-shrunk text width) */
        --ratio: tan(
          atan2(
            var(--available-space),
            var(--available-space) - var(--captured-length2)
          )
        );

        /* Multiply the base font-size (1rem) by the calculated ratio */
        --ideal-size: calc(var(--ratio) * 1rem);

        /* Clamp limits (Max 3rem prevents stretching too large on wider screens) */
        font-size: clamp(1rem, var(--ideal-size), 3rem);
        font-weight: 700;
        color: #50c2f7;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        text-align: center;
        white-space: nowrap;
        display: block;
        user-select: none;

        #title {
          display: block;
          white-space: nowrap;
          text-align: center;
          color: #50c2f7;
          font-weight: 700;
          text-transform: uppercase;

        }
      }

  <body>
    <div class="app-container">
      <div class="text-fit-container">
        <div class="text-fit">
          <!-- The actual visible text that scales -->
          <span id="title">ENGINE HUM SIMULATION</span>
          <!-- The reference copy used to measure native, unscaled text width -->
        </div>
      </div>
      <div class="card">
        <button id="playBtn">ENGAGE SIMULATION</button>
        <div class="control-group">
          <label
            >Engine Speed:
            <span id="tremSpeedVal" class="value-display">0.5 Hz</span></label
          >
          <input
            type="range"
            id="tremSpeed"
            min="0.1"
            max="10"
            step="0.05"
            value="0.5"
          />
        </div>
        <div class="control-group">
          <label
            >Engine Thrum:
            <span id="tremDepthVal" class="value-display">25%</span></label
          >
          <input
            type="range"
            id="tremDepth"
            min="0"
            max="100"
            step="1"
            value="25"
          />
        </div>
        <div class="control-group">
          <label
            >Engine Hiss:
            <span id="filterVal" class="value-display">120 Hz</span></label
          >
          <input
            type="range"
            id="filter"
            min="50"
            max="300"
            step="5"
            value="120"
          />
        </div>
        <div class="control-group">
          <label
            >Injector Volume Rumble:
            <span id="rumbleVal" class="value-display">12%</span></label
          >
          <input
            type="range"
            id="rumble"
            min="0"
            max="100"
            step="1"
            value="12"
          />
        </div>
        <div class="control-group">
          <label
            >Consoles: <span id="beepVal" class="value-display">0%</span></label
          >
          <input
            type="range"
            id="beepVolume"
            min="0"
            max="100"
            step="1"
            value="0"
          />
        </div>
      </div>
    </div>
    <script>
      function fitText(el) {
        const parent = el.parentElement;

        // Start at a known size
        el.style.fontSize = "10px";

        const available = parent.clientWidth;
        const actual = el.getBoundingClientRect().width;

        const newSize = 10 * (available / actual);

        el.style.fontSize = `${newSize}px`;
      }

      const title = document.getElementById("title");

      // Wait for the font
      document.fonts.ready.then(() => {
        fitText(title);
      });

      window.addEventListener("resize", () => fitText(title));
      // Wait for the 'Antonio' font to load before displaying the auto-scaled text
      if (document.fonts) {
        document.fonts
          .load("1em Antonio")
          .then(() => {
            document.documentElement.classList.add("fonts-loaded");
          })
          .catch(() => {
            // Fallback: If font fails to load, display anyway
            document.documentElement.classList.add("fonts-loaded");
          });
      } else {
        // Fallback for extremely old browsers
        document.documentElement.classList.add("fonts-loaded");
      }

      let audioCtx = null;
      let isPlaying = false;

      // Audio Nodes (ADDED: noiseGain)
      let noiseSource,
        noiseGain,
        tremoloLFO,
        tremoloGain,
        lfoDepthGain,
        masterGain;
      let filter1, filter2;
      let rumbleOsc1, rumbleOsc2, rumbleGainNode;
      let beepTimer = null;

      function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1. Generate White Noise Buffer
        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(
          1,
          bufferSize,
          audioCtx.sampleRate,
        );
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = (Math.random() * 2 - 1) * 0.5;
        }

        noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;

        // ADDED: Dedicated Noise Gain to compensate for lowpass filter volume drop
        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 1.8;

        // 2. Cascade 2 Lowpass Filters
        filter1 = audioCtx.createBiquadFilter();
        filter2 = audioCtx.createBiquadFilter();

        [filter1, filter2].forEach((f) => {
          f.type = "lowpass";
          f.frequency.value = parseFloat(
            document.getElementById("filter").value,
          );
          f.Q.value = 0.5;
        });

        // 3. Setup Tremolo LFO & Tremolo Gain Node
        tremoloGain = audioCtx.createGain();
        tremoloGain.gain.value = 0.5;

        tremoloLFO = audioCtx.createOscillator();
        tremoloLFO.type = "sine";
        tremoloLFO.frequency.value = parseFloat(
          document.getElementById("tremSpeed").value,
        );

        lfoDepthGain = audioCtx.createGain();
        const depthPct =
          parseFloat(document.getElementById("tremDepth").value) / 100;
        lfoDepthGain.gain.value = depthPct * 0.3;

        // 4. Setup Master Gain
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 1.0;

        // 5. Setup Star Trek Warm Engine Rumble (Harmonic Triangle Waves)
        rumbleOsc1 = audioCtx.createOscillator();
        rumbleOsc1.type = "triangle";
        rumbleOsc1.frequency.value = 60;

        rumbleOsc2 = audioCtx.createOscillator();
        rumbleOsc2.type = "triangle";
        rumbleOsc2.frequency.value = 90;

        rumbleGainNode = audioCtx.createGain();
        const rumbleVol =
          parseFloat(document.getElementById("rumble").value) / 100;
        rumbleGainNode.gain.value = rumbleVol * 0.3;

        // --- PATCH ROUTING ---
        noiseSource.connect(noiseGain); // Noise -> Noise Gain
        noiseGain.connect(tremoloGain); // Noise Gain -> Tremolo
        tremoloGain.connect(filter1);

        rumbleOsc1.connect(rumbleGainNode);
        rumbleOsc2.connect(rumbleGainNode);
        rumbleGainNode.connect(filter1);

        filter1.connect(filter2);
        filter2.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        tremoloLFO.connect(lfoDepthGain);
        lfoDepthGain.connect(tremoloGain.gain);

        // Start everything
        noiseSource.start();
        tremoloLFO.start();
        rumbleOsc1.start();
        rumbleOsc2.start();

        startBeepScheduler();
      }

      // --- SYNTHESIZE CONSOLE BEEPS ---
      function playConsoleBeep() {
        const beepVolPct = parseFloat(
          document.getElementById("beepVolume").value,
        );

        if (!audioCtx || audioCtx.state !== "running" || beepVolPct === 0)
          return;

        const osc = audioCtx.createOscillator();
        const beepGain = audioCtx.createGain();

        osc.type = "triangle";

        // Cozy, warm sci-fi tones
        const pitches = [932, 1396];
        const randomPitch = pitches[Math.floor(Math.random() * pitches.length)];
        osc.frequency.value = randomPitch;

        const now = audioCtx.currentTime;

        const targetGain = (beepVolPct / 100) * 0.05;

        beepGain.gain.setValueAtTime(0, now);
        beepGain.gain.linearRampToValueAtTime(targetGain, now + 0.01);
        beepGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

        osc.connect(beepGain);
        beepGain.connect(masterGain);

        osc.start(now);
        osc.stop(now + 0.2);
      }

      function startBeepScheduler() {
        if (beepTimer) clearTimeout(beepTimer);

        const delay = 4000 + Math.random() * 4000;

        beepTimer = setTimeout(() => {
          if (isPlaying) {
            playConsoleBeep();

            if (Math.random() < 0.4) {
              setTimeout(playConsoleBeep, 180);
            }
          }
          startBeepScheduler();
        }, delay);
      }

      document.getElementById("playBtn").addEventListener("click", function () {
        if (!audioCtx) {
          initAudio();
          this.textContent = "END SIMULATION";
          this.style.background = "#78fbc8";
          this.style.color = "#0f172a";
          isPlaying = true;
          return;
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume().then(() => {
            this.textContent = "DISENGAGE SIMULATION";
            this.style.background = "#78fbc8";
            this.style.color = "#0f172a";
            isPlaying = true;
          });
        } else if (audioCtx.state === "running") {
          audioCtx.suspend().then(() => {
            this.textContent = "ENGAGE SIMULATION";
            this.style.background = "#4fc3f7";
            this.style.color = "#081828";
            isPlaying = false;
          });
        }
      });

      // Slider Listeners (with safety checks if audioCtx has not started)
      document
        .getElementById("tremSpeed")
        .addEventListener("input", function (e) {
          document.getElementById("tremSpeedVal").textContent =
            e.target.value + " Hz";
          if (audioCtx && tremoloLFO)
            tremoloLFO.frequency.setValueAtTime(
              parseFloat(e.target.value),
              audioCtx.currentTime,
            );
        });

      document
        .getElementById("tremDepth")
        .addEventListener("input", function (e) {
          document.getElementById("tremDepthVal").textContent =
            e.target.value + "%";
          if (audioCtx && lfoDepthGain) {
            const depthPct = parseFloat(e.target.value) / 100;
            lfoDepthGain.gain.setValueAtTime(
              depthPct * 0.3,
              audioCtx.currentTime,
            );
          }
        });

      document.getElementById("filter").addEventListener("input", function (e) {
        document.getElementById("filterVal").textContent =
          e.target.value + " Hz";
        if (audioCtx && filter1 && filter2) {
          const freq = parseFloat(e.target.value);
          filter1.frequency.setValueAtTime(freq, audioCtx.currentTime);
          filter2.frequency.setValueAtTime(freq, audioCtx.currentTime);
        }
      });

      document.getElementById("rumble").addEventListener("input", function (e) {
        document.getElementById("rumbleVal").textContent = e.target.value + "%";
        if (audioCtx && rumbleGainNode) {
          const vol = (parseFloat(e.target.value) / 100) * 0.3;
          rumbleGainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        }
      });

      document
        .getElementById("beepVolume")
        .addEventListener("input", function (e) {
          document.getElementById("beepVal").textContent = e.target.value + "%";
        });
    </script>
  </body>
